name: TestPyPI

on:
  push:
    branches:
      - testpypi

permissions: read-all

jobs:
  pypi:
    name: Publish to TestPyPI
    permissions:
      id-token: write
    runs-on: ubuntu-slim
    environment:
      name: testpypi
      url: https://test.pypi.org/project/ragged-stubs
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - run: uv build
      - uses: astral-sh/attest-action@f589a42a7efb6fe400b4f400de60b4bc90390027 # v0.0.6
      - run: uv publish --index testpypi --trusted-publishing always
